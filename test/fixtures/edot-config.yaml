receivers:
  otlp:
    protocols:
      grpc: {}
      http: {}
  prometheus/infra:
    config:
      scrape_configs:
        - job_name: infra
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch: {}
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  ecsformatprocessor/logs:
    dataset: logs-generic

exporters:
  debug: {}
  elasticsearch/logs:
    endpoints: ["http://localhost:9200"]

extensions:
  health_check:
    endpoint: "localhost:13133"
  zpages:
    endpoint: "localhost:55679"

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp, prometheus/infra]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [ecsformatprocessor/logs, batch]
      exporters: [elasticsearch/logs]
