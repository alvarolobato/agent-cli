services:
  elastic-agent:
    image: elastic/elastic-agent:9.0.0
    user: root
    command: ["elastic-agent", "run", "-e", "-c", "/usr/share/elastic-agent/elastic-agent.yml"]
    volumes:
      - ./elastic-agent.yml:/usr/share/elastic-agent/elastic-agent.yml:ro
      - elastic-agent-state:/usr/share/elastic-agent/state
    ports:
      - "6791:6791"
      - "5066:5066"

  otelcol:
    image: python:3.13-alpine
    command: ["python", "-m", "http.server", "13133", "--bind", "0.0.0.0"]
    ports:
      - "13133:13133"

  edot-collector:
    image: python:3.13-alpine
    command: ["python", "-m", "http.server", "55679", "--bind", "0.0.0.0"]
    ports:
      - "55679:55679"

volumes:
  elastic-agent-state:
