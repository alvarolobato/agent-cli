services:
  elastic-agent:
    image: elastic/elastic-agent:9.0.0
    user: root
    command: ["elastic-agent", "run", "-e", "-c", "/usr/share/elastic-agent/elastic-agent.yml"]
    volumes:
      - ./elastic-agent.yml:/usr/share/elastic-agent/elastic-agent.yml:ro
      - elastic-agent-state:/usr/share/elastic-agent/state
    ports:
      - "6791:6791"
      - "5066:5066"

  edot-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./edot-collector.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "55679:55679"
      - "13133:13133"
      - "8888:8888"

volumes:
  elastic-agent-state:
