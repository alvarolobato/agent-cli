version: 2

project_name: agent-cli

builds:
  - id: agent-cli
    binary: agent-cli
    main: ./cmd/agent-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/alvarolobato/agent-cli/pkg/agentcli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
