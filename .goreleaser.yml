version: 2

project_name: agent-cli

builds:
  - id: agent-cli
    binary: agent-cli
    main: ./cmd/agent-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/alvarolobato/agent-cli/pkg/agentcli.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: sh
    args:
      - "-c"
      - 'if command -v cosign >/dev/null 2>&1; then cosign sign-blob --yes --output-signature "${signature}" --output-certificate "${certificate}" "${artifact}"; else echo "cosign not found; skipping signature"; fi'
    artifacts: checksum
    output: true

dockers:
  - id: agent-cli-docker-amd64
    use: buildx
    dockerfile: Dockerfile.release
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/alvarolobato/agent-cli:{{ .Version }}-amd64"
      - "ghcr.io/alvarolobato/agent-cli:latest-amd64"
  - id: agent-cli-docker-arm64
    use: buildx
    dockerfile: Dockerfile.release
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/alvarolobato/agent-cli:{{ .Version }}-arm64"
      - "ghcr.io/alvarolobato/agent-cli:latest-arm64"

docker_manifests:
  - name_template: "ghcr.io/alvarolobato/agent-cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/alvarolobato/agent-cli:{{ .Version }}-amd64"
      - "ghcr.io/alvarolobato/agent-cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/alvarolobato/agent-cli:latest"
    image_templates:
      - "ghcr.io/alvarolobato/agent-cli:latest-amd64"
      - "ghcr.io/alvarolobato/agent-cli:latest-arm64"

changelog:
  use: git
